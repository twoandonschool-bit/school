<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <title>تطبيق ولي الأمر</title>
  <style>
    body { background:#f0f4ff; font-family:Arial; text-align:center; padding:40px; }
    h1 { color:#0a0f1e; font-size:30px; }
    input, select { width:300px; padding:12px; font-size:18px; border-radius:10px; border:2px solid #dde4f5; margin:10px 0; text-align:center; }
    .btn { background:#00c896; color:white; border:none; padding:15px 40px; font-size:20px; border-radius:12px; cursor:pointer; display:block; margin:10px auto; width:300px; }
    .btn-red { background:#ef4444; }
    #شاشة_الاختيار { display:none; }
    #شاشة_الانتظار { display:none; }
  </style>
</head>
<body>

  <!-- شاشة الرقم السري -->
  <div id="شاشة_الرقم">
    <h1>🔐 أهلاً بك</h1>
    <p>أدخل كلمة السر</p>
    <input type="text" id="pin" placeholder="مثال: ab12cd" />
    <button class="btn" id="loginBtn">دخول</button>
    <p id="خطأ" style="color:red;"></p>
  </div>

  <!-- شاشة الاختيار -->
  <div id="شاشة_الاختيار">
    <h1>🚗 وصلت للمدرسة</h1>
    <p>اختر اسم ابنك</p>
    <select id="اسم_الطالب"></select>
    <button class="btn" id="sendBtn">📢 أرسل إشعار للمدرسة</button>
    <p id="رسالة" style="color:#00c896; font-size:18px;"></p>
  </div>

  <!-- شاشة الانتظار -->
  <div id="شاشة_الانتظار">
    <h1>⏳ بانتظار الاستدعاء</h1>
    <p id="اسم_المنتظر"></p>
    <p style="color:#6b7fa3;">سيظهر اسم ابنك على شاشة المدرسة</p>
    <button class="btn btn-red" id="cancelBtn">❌ استلمت ابني</button>
  </div>

  <script>
    const URL = 'https://pcfcfiidaaqlmhhdctmk.supabase.co/rest/v1';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjZmNmaWlkYWFxbG1oaGRjdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjk2ODQsImV4cCI6MjA5NDYwNTY4NH0.wllF4eYEIhdfSEwXNmCxPCtM9eUAw3lyVOSFf6DZnGM';
    const H = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };

    let currentStudentId = null;

    document.getElementById('loginBtn').addEventListener('click', async function() {
      let pin = document.getElementById('pin').value.trim();
      let r = await fetch(URL + '/parents?pin=eq.' + pin, { headers: H });
      let d = await r.json();

      if (d.length === 0) {
        document.getElementById('خطأ').innerText = '❌ كلمة السر غلط!';
      } else {
        let list = d[0].students_list.split(',');
        let select = document.getElementById('اسم_الطالب');
        select.innerHTML = '';
        list.forEach(s => {
          let opt = document.createElement('option');
          opt.value = s;
          opt.innerText = s.replace('|', ' — ');
          select.appendChild(opt);
        });
        document.getElementById('شاشة_الرقم').style.display = 'none';
        document.getElementById('شاشة_الاختيار').style.display = 'block';
      }
    });

    document.getElementById('sendBtn').addEventListener('click', async function() {
      let val = document.getElementById('اسم_الطالب').value;
      let parts = val.split('|');
      let r = await fetch(URL + '/students', {
        method: 'POST',
        headers: { ...H, 'Prefer': 'return=representation' },
        body: JSON.stringify({ name: parts[0], Class: parts[1] })
      });
      let d = await r.json();
      if (r.ok && d[0]) {
        currentStudentId = d[0].id;
        document.getElementById('اسم_المنتظر').innerText = '👦 ' + parts[0] + ' — ' + parts[1];
        document.getElementById('شاشة_الاختيار').style.display = 'none';
        document.getElementById('شاشة_الانتظار').style.display = 'block';
      }
    });

    document.getElementById('cancelBtn').addEventListener('click', async function() {
      if (currentStudentId) {
        await fetch(URL + '/students?id=eq.' + currentStudentId, { method: 'DELETE', headers: H });
      }
      document.getElementById('شاشة_الانتظار').style.display = 'none';
      document.getElementById('شاشة_الاختيار').style.display = 'block';
    });
  </script>
</body>
</html>
