<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <title>تطبيق ولي الأمر</title>
  <style>
    body {
      background-color: #f0f4ff;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }
    h1 { color: #0a0f1e; font-size: 30px; }
    input, select {
      width: 300px;
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: 2px solid #dde4f5;
      margin: 10px 0;
      text-align: center;
    }
    button {
      background-color: #00c896;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 20px;
      border-radius: 12px;
      cursor: pointer;
      display: block;
      margin: 10px auto;
      width: 300px;
    }
    #شاشة_الاختيار { display: none; }
  </style>
</head>
<body>

  <!-- شاشة الرقم السري -->
  <div id="شاشة_الرقم">
    <h1>🔐 أهلاً بك</h1>
    <p>أدخل رقمك السري</p>
    <input type="number" id="رقم_سري" placeholder="0000" />
    <button onclick="تحقق()">دخول</button>
    <p id="خطأ" style="color:red;"></p>
  </div>

  <!-- شاشة الاختيار -->
  <div id="شاشة_الاختيار">
    <h1>🚗 وصلت للمدرسة</h1>
    <p>اختر اسم ابنك</p>
    <select id="اسم_الطالب"></select>
    <button onclick="أرسل()">📢 أرسل إشعار للمدرسة</button>
    <p id="رسالة" style="color:#00c896; font-size:18px;"></p>
  </div>

  <script>
    const SUPABASE_URL = 'https://pcfcfiidaaqlmhhdctmk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjZmNmaWlkYWFxbG1oaGRjdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjk2ODQsImV4cCI6MjA5NDYwNTY4NH0.wllF4eYEIhdfSEwXNmCxPCtM9eUAw3lyVOSFf6DZnGM';

    let طلابي = [];

    async function تحقق() {
      let pin = document.getElementById('رقم_سري').value;

      let response = await fetch(
        SUPABASE_URL + '/rest/v1/parents?pin=eq.' + pin,
        {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY
          }
        }
      );

      let data = await response.json();

      if (data.length === 0) {
        document.getElementById('خطأ').innerText = '❌ الرقم السري غلط!';
      } else {
        let students_list = data[0].students_list;
        طلابي = students_list.split(',');

        let select = document.getElementById('اسم_الطالب');
        select.innerHTML = '';
        طلابي.forEach(s => {
          let option = document.createElement('option');
          option.value = s;
          option.innerText = s.replace('|', ' — ');
          select.appendChild(option);
        });

        document.getElementById('شاشة_الرقم').style.display = 'none';
        document.getElementById('شاشة_الاختيار').style.display = 'block';
      }
    }

    async function أرسل() {
      let قيمة = document.getElementById('اسم_الطالب').value;
      let parts = قيمة.split('|');
      let الاسم = parts[0];
      let الفصل = parts[1];

      let response = await fetch(SUPABASE_URL + '/rest/v1/students', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ name: الاسم, Class: الفصل })
      });

      if (response.ok) {
        document.getElementById('رسالة').innerText = '✅ تم الإرسال! انتظر استدعاء ' + الاسم;
      } else {
        document.getElementById('رسالة').innerText = '❌ حدث خطأ!';
      }
    }
  </script>
</body>
</html>
