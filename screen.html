<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <title>شاشة المدرسة</title>
  <style>
    body {
      background-color: #0a0f1e;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }
    h1 { color: #00c896; font-size: 50px; }
    .بطاقة {
      background-color: #111827;
      border: 2px solid #1e2d47;
      border-radius: 15px;
      padding: 20px;
      margin: 15px auto;
      width: 400px;
      font-size: 22px;
    }
    button {
      background:#00c896;
      color:white;
      border:none;
      padding:8px 20px;
      border-radius:8px;
      cursor:pointer;
      margin-right:15px;
    }
  </style>
</head>
<body>
  <h1>📢 شاشة الاستدعاء</h1>
  <p>الطلاب المطلوب استدعاؤهم</p>
  <div id="قائمة"></div>

  <script>
    const SUPABASE_URL = 'https://pcfcfiidaaqlmhhdctmk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjZmNmaWlkYWFxbG1oaGRjdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjk2ODQsImV4cCI6MjA5NDYwNTY4NH0.wllF4eYEIhdfSEwXNmCxPCtM9eUAw3lyVOSFf6DZnGM';

    function أضف_بطاقة(student) {
      let div = document.createElement('div');
      div.className = 'بطاقة';
      div.id = 'student-' + student.id;
      div.innerHTML = '👦 ' + student.name + ' — ' + student.Class +
        ' <button onclick="احذف(' + student.id + ')">✅ تم الاستدعاء</button>';
      document.getElementById('قائمة').appendChild(div);
    }

    async function احذف(id) {
      await fetch(SUPABASE_URL + '/rest/v1/students?id=eq.' + id, {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        }
      });
      document.getElementById('student-' + id).remove();
    }

    async function تحميل() {
      let response = await fetch(SUPABASE_URL + '/rest/v1/students?select=*', {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        }
      });
      let data = await response.json();
      document.getElementById('قائمة').innerHTML = '';
      data.forEach(s => أضف_بطاقة(s));
    }

    setInterval(تحميل, 3000);
    تحميل();
  </script>
</body>
</html>
